<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("fondo.jpg"); /* Imagen en carpeta public */
      background-size: cover;
      background-position: center;
    }

    #loginForm {
      background-color: rgba(255, 255, 255, 0.85); /* cuadro semitransparente */
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
      width: 300px;
      z-index: 2;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      margin: 10px 0;
      padding: 8px;
      width: 90%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 8px 16px;
      margin-top: 10px;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1976d2;
    }

    /* Logo girando sobre eje Y */
    #logoAnimado {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      animation: girarY 2s ease-in-out infinite;
      opacity: 0.7; /* efecto marca de agua */
      z-index: 1;
      transform-style: preserve-3d;
    }

    @keyframes girarY {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }
  </style>
</head>
<body>
  <!-- Logo girando -->
  <img src="logo.png" alt="Logo" id="logoAnimado">

  <!-- Formulario de login -->
  <form id="loginForm">
    <h2>Acceso al sistema</h2>
    <input type="text" id="usuario" placeholder="Usuario" required><br>
    <input type="password" id="password" placeholder="Contraseña" required><br>
    <button type="submit">Ingresar</button>
  </form>

  <script>
    // Lista de usuarios válidos
    const usuariosValidos = {
      "FabricioSouville": "FabricioDS",
      "VanesaPoggio": "VanesaDS",
      "AilinSuarez": "AilinDS",
      "DoloresSastre": "DoloresDS",
      "DiegoSastre": "DiegoDS",
      "TomasRudy": "TomasDS",
      "FranciscoTolosa": "FranciscoDS",
      "LucianoBanfi": "LucianoDS",
      "CiroGonzalez": "CiroDS",
      "PatricioTorrijo": "PatricioDS",
      "SebastianAlvarez": "SebastianDS",
      "MilagrosMartinArrieta": "MilagrosDS",
      "SantiagoUrruti": "SantiagoDS",
      "MercedesRiega": "MercedesDS"
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      if (usuariosValidos[usuario] && usuariosValidos[usuario] === password) {
        localStorage.setItem("logueado","true");
        localStorage.setItem("usuario", usuario); // guarda quién entró
        document.getElementById('logoAnimado').style.display = "none"; // oculta logo
        window.location.href = "index.html";
      } else {
        alert("Usuario o contraseña incorrectos");
      }
    });
  </script>
</body>
</html>
