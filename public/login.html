<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    /* Logo girando en esquina superior derecha */
    .logo {
      width: 120px;
      height: 120px;
      animation: girar 5s linear infinite;
      position: absolute;
      top: 20px;
      right: 20px;
    }

    @keyframes girar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      margin-bottom: 20px;
    }

    form {
      display: inline-block;
      text-align: left;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      margin: 10px 0;
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background-color: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <!-- Logo girando -->
  <img src="logo-v2.png" class="logo" alt="Logo">

  <h1>Acceso al Dashboard</h1>
  <form onsubmit="login(event)">
    <label>Usuario</label><br>
    <input type="text" required><br>
    <label>Contraseña</label><br>
    <input type="password" required><br>
    <button type="submit">Ingresar</button>
  </form>

  <script>
    function login(e) {
      e.preventDefault();
      // Simulación de login
      localStorage.setItem("logueado", "true");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
